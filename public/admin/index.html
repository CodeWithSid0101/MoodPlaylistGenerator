<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://accounts.spotify.com;
    style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://accounts.spotify.com https://fonts.googleapis.com;
    style-src-elem 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://accounts.spotify.com https://fonts.googleapis.com;
    img-src 'self' data: blob: https://*.scdn.co https://i.scdn.co https://mosaic.scdn.co https://*.openweathermap.org https://*.spotify.com;
    font-src 'self' https: data:;
    connect-src 'self' https://accounts.spotify.com https://api.spotify.com https://api.openweathermap.org;
    frame-src 'self' https://accounts.spotify.com;
    media-src 'self' blob: https://*.spotifycdn.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';">
  <title>Mood Playlist Generator - Admin Dashboard</title>
  <!-- Preload critical CSS -->
  <link rel="preload" href="/style.css" as="style">
  <link rel="preload" href="/admin/admin.css" as="style">
  
  <!-- Load stylesheets -->
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  
  <!-- Load Font Awesome with fallback -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" 
    onerror="console.error('Failed to load Font Awesome');" />
    
  <!-- Load Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" 
    rel="stylesheet"
    onerror="console.error('Failed to load Google Fonts');">
</head>
<body>
  <div class="music-notes">
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
    <span class="note">&#9834;</span>
    <span class="note">&#9836;</span>
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
  </div>
  
  <div class="container admin-container">
    <div class="logo-container">
      <div class="logo-circle">
        <i class="fas fa-user-shield"></i>
      </div>
    </div>
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Manage user registrations for Spotify Developer Dashboard</p>
    
    <div class="admin-controls">
      <button id="refresh-btn" class="admin-btn">
        <i class="fas fa-sync-alt"></i> Refresh Data
      </button>
      <button id="export-btn" class="admin-btn">
        <i class="fas fa-file-export"></i> Export CSV
      </button>
      <button id="logoutBtn" class="admin-btn btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
    
    <div class="user-stats">
      <div class="stat-card">
        <h3>Total Users</h3>
        <p id="total-users">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pending-users">0</p>
      </div>
      <div class="stat-card">
        <h3>Approved</h3>
        <p id="approved-users">0</p>
      </div>
    </div>
    
    <div class="approvals-list" id="approvalsContainer">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i> Loading pending approvals...
      </div>
    </div>
    
    <div class="users-table-container">
      <h2>Registered Users</h2>
      <div class="table-filters">
        <select id="status-filter">
          <option value="all">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <input type="text" id="search-input" placeholder="Search by name or email...">
      </div>
      <table id="users-table" class="users-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Registration Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <!-- User data will be populated here -->
          <tr class="empty-state">
            <td colspan="5">Loading user data...</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div id="notification" class="admin-notification"></div>
    
    <div class="admin-footer">
      <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Main Site
      </a>
    </div>
  </div>

  <!-- Load admin.js with error handling -->
  <script>
    (function() {
      const script = document.createElement('script');
      script.src = '/admin/admin.js';
      script.type = 'application/javascript';
      script.onerror = function() {
        console.error('Failed to load admin.js');
        // Show error message to user
        const errorDiv = document.createElement('div');
        errorDiv.style.background = '#ffebee';
        errorDiv.style.color = '#c62828';
        errorDiv.style.padding = '1rem';
        errorDiv.style.margin = '1rem';
        errorDiv.style.borderRadius = '4px';
        errorDiv.style.border = '1px solid #ef9a9a';
        errorDiv.innerHTML = `
          <h3>Error Loading Admin Panel</h3>
          <p>Failed to load admin scripts. Please try refreshing the page or contact support if the issue persists.</p>
          <button onclick="window.location.reload()" style="
            background: #c62828;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.5rem;
          ">
            Refresh Page
          </button>
        `;
        document.body.prepend(errorDiv);
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
