<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP will be set by the server with proper nonce -->
  <title>Mood Playlist Generator - Admin Dashboard</title>
  <!-- Preload critical CSS -->
  <link rel="preload" href="/style.css" as="style">
  <link rel="preload" href="/admin/admin.css" as="style">
  
  <!-- Load stylesheets -->
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  
  <!-- Load Font Awesome with fallback -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" 
    onerror="console.error('Failed to load Font Awesome');" />
    
  <!-- Load Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" 
    rel="stylesheet"
    onerror="console.error('Failed to load Google Fonts');">
</head>
<body>
  <div class="music-notes">
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
    <span class="note">&#9834;</span>
    <span class="note">&#9836;</span>
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
  </div>
  
  <div class="container admin-container">
    <div class="logo-container">
      <div class="logo-circle">
        <i class="fas fa-user-shield"></i>
      </div>
    </div>
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Manage user registrations for Spotify Developer Dashboard</p>
    
    <div class="admin-controls">
      <button id="refresh-btn" class="admin-btn">
        <i class="fas fa-sync-alt"></i> Refresh Data
      </button>
      <button id="export-btn" class="admin-btn">
        <i class="fas fa-file-export"></i> Export CSV
      </button>
      <button id="logoutBtn" class="admin-btn btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
    
    <div class="user-stats">
      <div class="stat-card">
        <h3>Total Users</h3>
        <p id="total-users">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pending-users">0</p>
      </div>
      <div class="stat-card">
        <h3>Approved</h3>
        <p id="approved-users">0</p>
      </div>
    </div>
    
    <main class="admin-content">
      <section class="admin-section">
        <h2>Pending Approvals</h2>
        <div id="status-message" class="alert" style="display: none;"></div>
        <div id="pending-approvals" class="approval-list">
          <!-- Pending approvals will be loaded here -->
          <div id="loading-spinner" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading pending approvals...</p>
          </div>
        </div>
      </section>
      
      <section class="admin-section">
        <h2>Registered Users</h2>
        <div class="table-filters">
          <select id="status-filter">
            <option value="all">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <input type="text" id="search-input" placeholder="Search by name or email...">
        </div>
        <table id="users-table" class="users-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Registration Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <!-- User data will be populated here -->
            <tr class="empty-state">
              <td colspan="5">Loading user data...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Main application script -->
  <script nonce="<%= nonce %>" src="/admin/admin-loader.js"></script>
</body>
</html>
