<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Playlist Generator - Authentication</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .spinner {
      font-size: 3rem;
      margin: 2rem 0;
      color: #1DB954;
    }
  </style>
</head>
<body>
  <div class="music-notes">
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
    <span class="note">&#9834;</span>
    <span class="note">&#9836;</span>
    <span class="note">&#9835;</span>
    <span class="note">&#9833;</span>
  </div>
  
  <div class="container auth-container">
    <div class="logo-container">
      <div class="logo-circle">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
    </div>
    
    <h1>Completing Authentication</h1>
    <p>Please wait while we connect to your Spotify account...</p>
    
    <div id="auth-status" class="status-message">
      <div class="spinner">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <p>Authenticating with Spotify...</p>
    </div>
    
    <div id="auth-error" class="error-message" style="display: none;">
      <i class="fas fa-exclamation-triangle"></i>
      <p>There was an error during authentication. Please try again.</p>
      <button id="retry-button" class="btn btn-primary">
        <i class="fas fa-redo"></i> Try Again
      </button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');
      const state = urlParams.get('state');
      
      const authStatus = document.getElementById('auth-status');
      const authError = document.getElementById('auth-error');
      const retryButton = document.getElementById('retry-button');
      
      if (error) {
        console.error('Spotify authentication error:', error);
        showError('Authentication failed: ' + error);
        return;
      }
      
      if (!code) {
        showError('No authorization code received from Spotify');
        return;
      }
      
      try {
        // Exchange the authorization code for an access token
        const response = await fetch('/api/spotify/callback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code, state })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to authenticate with Spotify');
        }
        
        const data = await response.json();
        
        // Store the access token and redirect to the main app
        localStorage.setItem('spotify_access_token', data.access_token);
        localStorage.setItem('spotify_refresh_token', data.refresh_token);
        localStorage.setItem('spotify_token_expires_at', 
          Date.now() + (data.expires_in * 1000));
        
        // Redirect to the main app
        window.location.href = '/';
        
      } catch (error) {
        console.error('Authentication error:', error);
        showError(error.message || 'An error occurred during authentication');
      }
      
      function showError(message) {
        authStatus.style.display = 'none';
        authError.style.display = 'block';
        const errorMessage = authError.querySelector('p');
        if (errorMessage) {
          errorMessage.textContent = message;
        }
      }
      
      retryButton?.addEventListener('click', () => {
        window.location.href = '/';
      });
    });
  </script>
</body>
</html>
