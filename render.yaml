services:
  - type: web
    name: mood-playlist-generator
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SPOTIFY_CLIENT_ID
        fromParam: SPOTIFY_CLIENT_ID
      - key: SPOTIFY_CLIENT_SECRET
        fromParam: SPOTIFY_CLIENT_SECRET
      - key: OPENWEATHER_API_KEY
        fromParam: OPENWEATHER_API_KEY
      - key: NODE_VERSION
        value: 20.x
