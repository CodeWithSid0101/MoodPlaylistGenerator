  - type: web
    name: spotify-playlist-generator
    runtime: node
    plan: free
    rootDir: ./
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
directories:
  - models/
  - routes/
  - middleware/
  - public/
  - server/
files:
  - server.js
  - package.json
  - render.yaml
  - Procfile

